version: '3.8'

# Опционально: раскомментируйте redis и REDIS_URL в environment бота для кэша расписания в Redis.
# Локально: docker compose up -d redis && в .env задать REDIS_URL=redis://redis:6379/0

services:
  studentbuddy:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: studentbuddy-bot
    restart: unless-stopped
    
    # Переменные окружения из .env файла
    env_file:
      - .env
    
    environment:
      - TZ=Europe/Moscow
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - DATABASE_PATH=/app/data/studentbuddy.db
      - PERSISTENCE_FILE=/app/data/studentbuddy_data.pickle
      # Кэш расписания в Redis (опционально): раскомментируйте при поднятом redis
      # - REDIS_URL=redis://redis:6379/0
      # - SCHEDULE_CACHE_TTL=600
    
    # Монтирование volumes для данных
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - ./locales:/app/locales:ro
    
    # Логирование
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    
    # Health check
    healthcheck:
      test: ["CMD", "python3", "health_check.py"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s
    
    # Ограничения ресурсов
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          cpus: '0.5'
          memory: 256M

  # Redis для кэша расписания (опционально). Запуск: docker compose up -d redis
  # redis:
  #   image: redis:7-alpine
  #   container_name: studentbuddy-redis
  #   restart: unless-stopped
  #   ports:
  #     - "6379:6379"

# Volumes для постоянного хранения данных
volumes:
  data:
  logs:
